- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.zshrc:
      force: true
      path: _backup/.zshrc
    ~/.config/starship.toml:
      create: true
      force: true
      path: _backup/starship.toml
    ~/.config/zellij:
      create: true
      force: true
      path: _backup/zellij
    ~/.config/ghostty:
      create: true
      force: true
      path: _backup/ghostty
    ~/.config/k9s:
      create: true
      force: true
      path: _backup/k9s
    ~/.config/opencode/opencode.jsonc:
      create: true
      force: true
      path: _backup/opencode/opencode.jsonc
    ~/.config/opencode/oh-my-openagent.jsonc:
      create: true
      force: true
      path: _backup/opencode/oh-my-openagent.jsonc
    ~/.config/opencode/package.json:
      create: true
      force: true
      path: _backup/opencode/package.json
    ~/.config/opencode/bun.lock:
      create: true
      force: true
      path: _backup/opencode/bun.lock
    ~/.config/opencode/plugin:
      create: true
      force: true
      path: _backup/opencode/plugin
    ~/.config/opencode/skills:
      create: true
      force: true
      path: _backup/opencode/skills
    ~/.config/nvim:
      create: true
      force: true
      path: _backup/nvim
    ~/.config/fastfetch:
      create: true
      force: true
      path: _backup/fastfetch
    ~/.hammerspoon/init.lua:
      create: true
      force: true
      path: _backup/.hammerspoon/init.lua
    ~/.vimrc:
      force: true
      path: _backup/.vimrc
    ~/.gitignore:
      force: true
      path: _backup/.gitignore
    ~/.gitconfig:
      force: true
      path: _backup/.gitconfig
    ~/.tmux.conf:
      force: true
      path: _backup/.tmux.conf
    ~/.krew-plugins.txt:
      force: true
      path: _backup/krew-plugins.txt
    ~/.mackup.cfg:
      force: true
      path: .mackup.cfg

- create:
    - ~/Projects

- if:
    cond: 'test ! $(which brew)'
    met:
    - shell:
      - [/bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)", Install Homebrew]

- if:
    cond: 'test ! ~/.vim/autoload/plug.vim'
    met:
    - shell:
      - [curl -fLo ~/.vim/autoload/plug.vim --create-dirs https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim | vim, Install Plug]

- shell:
  - [chsh -s $(which zsh), Set ZSH as default shell]
  - [git submodule update --init --recursive, Installing submodules]
  # - [mackup restore, Run mackup restore]
  - [composer global require laravel/installer, Add Laravel as a global composer package]
  - [sync-krew, Install krew plugins]

- brewfile:
    - Brewfile
