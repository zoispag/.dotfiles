- defaults:
    link:
      relink: true

- clean: ['~']

# Layout is grouped by app; the link TARGET decides home (~) vs XDG (~/.config).
- link:
    # --- Shell (home-targeted) ---
    ~/.zshrc:
      force: true
      path: zsh/zshrc

    # --- Prompt (XDG-targeted) ---
    ~/.config/starship.toml:
      create: true
      force: true
      path: starship/starship.toml

    # --- Terminal multiplexers / emulators (XDG-targeted) ---
    ~/.config/zellij:
      create: true
      force: true
      path: zellij
    ~/.config/ghostty:
      create: true
      force: true
      path: ghostty

    # --- k9s (XDG-targeted) ---
    ~/.config/k9s:
      create: true
      force: true
      path: k9s

    # --- opencode (XDG-targeted, per-file links so app writes don't touch the repo) ---
    ~/.config/opencode/opencode.jsonc:
      create: true
      force: true
      path: opencode/opencode.jsonc
    ~/.config/opencode/tui.json:
      create: true
      force: true
      path: opencode/tui.json
    ~/.config/opencode/oh-my-openagent.jsonc:
      create: true
      force: true
      path: opencode/oh-my-openagent.jsonc
    ~/.config/opencode/package.json:
      create: true
      force: true
      path: opencode/package.json
    ~/.config/opencode/bun.lock:
      create: true
      force: true
      path: opencode/bun.lock
    ~/.config/opencode/plugin:
      create: true
      force: true
      path: opencode/plugin
    ~/.config/opencode/skills:
      create: true
      force: true
      path: opencode/skills

    # --- nvim (XDG-targeted) ---
    ~/.config/nvim:
      create: true
      force: true
      path: nvim

    # --- fastfetch (XDG-targeted) ---
    ~/.config/fastfetch:
      create: true
      force: true
      path: fastfetch

    # --- hammerspoon (home-targeted) ---
    ~/.hammerspoon/init.lua:
      create: true
      force: true
      path: hammerspoon/init.lua

    # --- vim (home-targeted) ---
    ~/.vimrc:
      force: true
      path: vim/vimrc

    # --- git (home-targeted) ---
    ~/.gitignore:
      force: true
      path: git/gitignore
    ~/.gitconfig:
      force: true
      path: git/gitconfig

    # --- tmux (home-targeted) ---
    ~/.tmux.conf:
      force: true
      path: tmux/tmux.conf

    # --- mackup (repo-root config, unchanged) ---
    ~/.mackup.cfg:
      force: true
      path: .mackup.cfg

- create:
  - ~/Projects

- if:
    cond: 'test ! $(which brew)'
    met:
    - shell:
      - [/bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)", Install Homebrew]

- if:
    cond: 'test ! ~/.vim/autoload/plug.vim'
    met:
    - shell:
      - [curl -fLo ~/.vim/autoload/plug.vim --create-dirs https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim | vim, Install Plug]

- if:
    cond: 'test ! -d ~/.tmux/plugins/tpm'
    met:
    - shell:
      - [git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm, Install tmux plugin manager]

# Only change the login shell when it isn't already zsh (avoids a chsh password prompt on re-runs).
- if:
    cond: 'test "$SHELL" != "$(which zsh)"'
    met:
    - shell:
      - [chsh -s $(which zsh), Set ZSH as default shell]

# Run only when no plugins beyond tpm itself are installed yet.
# tpm's installer needs a running tmux server (reads TMUX_PLUGIN_MANAGER_PATH via
# run-shell), so bootstrap on an isolated socket that never touches real sessions.
- if:
    cond: 'test -z "$(ls ~/.tmux/plugins 2>/dev/null | grep -v ''^tpm$'')"'
    met:
    - shell:
      - ['tmux -L tpm_bootstrap -f ~/.tmux.conf new-session -d \; run-shell ~/.tmux/plugins/tpm/bindings/install_plugins && sleep 5 ; tmux -L tpm_bootstrap kill-server 2>/dev/null || true', Install tmux plugins]

# Install the Laravel installer only when it isn't already present.
- if:
    cond: 'test ! -f ~/.composer/vendor/bin/laravel && test ! -f ~/.config/composer/vendor/bin/laravel'
    met:
    - shell:
      - [composer global require laravel/installer, Add Laravel as a global composer package]

- shell:
  - [echo 'Mackup restore is commented out by default; uncomment to restore your backed-up app configs', Display mackup restore message]
  # - [mackup restore, Run mackup restore]

# - brewfile:
  # - Brewfile

# Runs after brewfile so kubectl + krew (installed via Homebrew) already exist;
# the krewfile plugin guards on them and does not bootstrap.
- krewfile:
  - Krewfile
