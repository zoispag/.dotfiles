# ~/.tmux.conf

# ───────────────────────────── General ──────────────────────────────
set -s extended-keys on

# Enable mouse support (scroll, select panes/windows, resize by dragging).
# Single option for tmux >= 2.1 (replaces the old mode-mouse quad).
set -g mouse on

# Use 24-bit true color + italics so the theme renders correctly.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Refresh the status bar every second so net-speed / time stay live.
set -g status-interval 1

# ─────────────────────────── tmux-power ─────────────────────────────
# Theme options MUST be set before the plugin is loaded by tpm.
#
# 'forest' gives the green/olive powerline look. Alternatives:
#   gold (default), everforest, moon, coral, snow, violet, redwine, sky
# You can also use a truecolor hex like '#483D8B' or a terminal 'colourN'.
set -g @tmux_power_theme 'forest'

# Powerline arrow separators (nerd-font glyphs).
set -g @tmux_power_right_arrow_icon ''
set -g @tmux_power_left_arrow_icon  ''

# Left sections (outer -> inner): user@host, session name, upload speed.
set -g @tmux_power_left_a '#{USER}@#h'
set -g @tmux_power_left_b '#S'
set -g @tmux_power_left_c '󰕒 #{upload_speed}'

# Right sections (inner -> outer): download speed, time, date.
set -g @tmux_power_right_x '󰇚 #{download_speed}'
set -g @tmux_power_right_y '%T'
set -g @tmux_power_right_z '%F'

# ──────────────────────── Plugins (via TPM) ─────────────────────────
# Managed by the Tmux Plugin Manager. Install/update with:
#   prefix + I   (install)   prefix + U   (update)   prefix + alt-u (clean)
# On a fresh machine dotbot clones tpm and runs install_plugins for you.
#
# Load tmux-power BEFORE net-speed (net-speed post-processes the status
# line; the theme must be applied first).
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'wfxr/tmux-power'
set -g @plugin 'wfxr/tmux-net-speed'

# Initialize TPM — keep this line at the very bottom of the file.
run '~/.tmux/plugins/tpm/tpm'
