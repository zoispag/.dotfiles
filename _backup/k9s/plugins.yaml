plugins:
  taint-node:
    shortCut: Shift-T
    confirm: false
    description: "Taint node with custom or default taint"
    scopes:
      - nodes
    command: bash
    background: false
    args:
      - -c
      - |
        read -p "Enter taint (format key=value:effect, default k9s=true:NoSchedule): " TAINT
        if [ -z "$TAINT" ]; then
          TAINT="k9s=true:NoSchedule"
        fi
        echo "kubectl --context $CONTEXT taint nodes $NAME $TAINT --overwrite=true" >> ~/.k9s/debug.log
        kubectl --context $CONTEXT taint nodes $NAME $TAINT --overwrite=true 2>&1 | tee -a ~/.k9s/debug.log
  untaint-node:
    shortCut: Shift-U
    confirm: false
    description: "Remove taint k9s=true:NoSchedule from node"
    scopes:
      - nodes
    command: bash
    background: false
    args:
      - -c
      - |
        read -p "Enter taint to remove (format key:effect, default k9s=true:NoSchedule): " TAINT
        if [ -z "$TAINT" ]; then
          TAINT="k9s=true:NoSchedule"
        fi
        echo "kubectl --context $CONTEXT taint nodes $NAME $TAINT- --overwrite=true" >> ~/.k9s/debug.log
        kubectl --context $CONTEXT taint nodes $NAME $TAINT- --overwrite=true 2>&1 | tee -a ~/.k9s/debug.log
  evict-pods:
    shortCut: Shift-V
    confirm: true
    description: "Evict pod"
    scopes:
      - pods
    command: bash
    dangerous: true
    background: true
    args:
      - -c
      - |
        echo "kubectl evict-pod --context $CONTEXT $NAME -n $NAMESPACE" >> ~/.k9s/debug.log
        kubectl evict-pod --context $CONTEXT $NAME -n $NAMESPACE 2>&1 | tee -a ~/.k9s/debug.log
  # Manage cert-manager Certificate resouces via cmctl.
  # See: https://github.com/cert-manager/cmctl
  cert-status:
    shortCut: Shift-S
    confirm: false
    description: Certificate status
    scopes:
      - certificates
    command: bash
    background: false
    args:
      - -c
      - "cmctl status certificate --context $CONTEXT -n $NAMESPACE $NAME |& less"
  cert-renew:
    shortCut: Shift-R
    confirm: false
    description: Certificate renew
    scopes:
      - certificates
    command: bash
    background: false
    args:
      - -c
      - "cmctl renew --context $CONTEXT -n $NAMESPACE $NAME |& less"
  secret-inspect:
    shortCut: Shift-I
    confirm: false
    description: Inspect secret
    scopes:
      - secrets
    command: bash
    background: false
    args:
      - -c
      - "cmctl inspect secret --context $CONTEXT -n $NAMESPACE $NAME |& less"
  sync-app:
    shortCut: Shift-S
    confirm: false
    scopes:
      - apps
    description: Sync a argocd app
    command: bash
    background: false
    args:
      - -c
      - "argocd app sync $NAME"
  crd-wizard:
    shortCut: Shift-W
    description: CRD Wizard
    dangerous: false
    scopes:
      - crds
    command: bash
    background: false
    confirm: false
    args:
      - -c
      - "kubectl crd-wizard tui --kind $COL-KIND"
  resource-creator:
    shortCut: Shift-K
    description: Apply resource from editor with kubectl
    scopes:
      - all
    command: bash
    background: false
    args:
      - -c
      - |
        set -e
        # Create tmp file
        tmpfile=$(mktemp /tmp/k9s-apply-XXXXXX).yaml
        # Cleanup tmp file at the end
        trap "rm -f '$tmpfile'" EXIT
        ${EDITOR:-vim} "$tmpfile"
        kubectl --context "$CONTEXT" apply -f "$tmpfile" --warnings-as-errors
  node-shell:
    shortCut: Ctrl-N
    description: "Open a root shell on a node using the node-shell plugin"
    scopes:
      - nodes
    command: kubectl
    args:
      - node-shell
      - $NAME
      - --context
      - $CONTEXT
    background: false
    confirm: false
  external-secret-refresh:
    shortCut: Shift-R
    confirm: false
    scopes:
      - externalsecrets
    description: Force sync
    command: bash
    background: false
    args:
      - -c
      - "kubectl annotate es $NAME force-sync=$(date +%s) --overwrite --context $CONTEXT -n $NAMESPACE"
  holmesgpt:
    shortCut: Shift-H
    description: Ask HolmesGPT
    scopes:
      - all
    command: bash
    background: false
    confirm: false
    args:
      - -c
      - |
        # Check if we're already using the correct context
        CURRENT_CONTEXT=$(kubectl config current-context 2>/dev/null || echo "")
        if [ "$CURRENT_CONTEXT" = "$CONTEXT" ]; then
          # Already using the correct context, run HolmesGPT directly
          holmes ask "why is $NAME of $RESOURCE_NAME in -n $NAMESPACE not working as expected"
        else
          # Create temporary kubeconfig to avoid changing user's system context
          # K9s passes $CONTEXT but we need to ensure HolmesGPT uses the same context
          # without permanently switching the user's kubectl context
          TEMP_KUBECONFIG=$(mktemp)
          kubectl config view --raw > $TEMP_KUBECONFIG
          KUBECONFIG=$TEMP_KUBECONFIG kubectl config use-context $CONTEXT
          # KUBECONFIG environment variable is passed to holmes and all its child processes
          KUBECONFIG=$TEMP_KUBECONFIG holmes ask "why is $NAME of $RESOURCE_NAME in -n $NAMESPACE not working as expected"
          rm -f $TEMP_KUBECONFIG
        fi
        echo "Press 'q' to exit"
        while : ; do
        read -n 1 k <&1
        if [[ $k = q ]] ; then
        break
        fi
        done
  interactive-holmesgpt:
    shortCut: Shift-Q
    description: Interactive HolmesGPT Ask
    scopes:
      - all
    command: bash
    background: false
    confirm: false
    args:
      - -c
      - |
        INSTRUCTIONS="# Edit the line below. Lines starting with '#' will be ignored."
        DEFAULT_ASK_COMMAND="why is $NAME of $RESOURCE_NAME in -n $NAMESPACE not working as expected"
        QUESTION_FILE=$(mktemp)

        echo "$INSTRUCTIONS" > "$QUESTION_FILE"
        echo "$DEFAULT_ASK_COMMAND" >> "$QUESTION_FILE"

        # Open the line in the default text editor
        ${EDITOR:-nano} "$QUESTION_FILE"

        # Read the modified line, ignoring lines starting with '#'
        user_input=$(grep -v '^#' "$QUESTION_FILE")

        echo "Running: holmes ask '$user_input'"
        # Check if we're already using the correct context
        CURRENT_CONTEXT=$(kubectl config current-context 2>/dev/null || echo "")
        if [ "$CURRENT_CONTEXT" = "$CONTEXT" ]; then
          # Already using the correct context, run HolmesGPT directly
          holmes ask "$user_input"
        else
          # Create temporary kubeconfig to avoid changing user's system context
          # K9s passes $CONTEXT but we need to ensure HolmesGPT uses the same context
          # without permanently switching the user's kubectl context
          TEMP_KUBECONFIG=$(mktemp)
          kubectl config view --raw > $TEMP_KUBECONFIG
          KUBECONFIG=$TEMP_KUBECONFIG kubectl config use-context $CONTEXT
          # KUBECONFIG environment variable is passed to holmes and all its child processes
          KUBECONFIG=$TEMP_KUBECONFIG holmes ask "$user_input"
          rm -f $TEMP_KUBECONFIG
        fi
        echo "Press 'q' to exit"
        while : ; do
        read -n 1 k <&1
        if [[ $k = q ]] ; then
        break
        fi
        done
